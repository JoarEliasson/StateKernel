name: dotnet-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true

      - name: Restore
        run: dotnet restore StateKernel.sln

      - name: Build
        run: dotnet build StateKernel.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test StateKernel.sln --configuration Release --no-build --verbosity normal
